[build]
builder = "dockerfile"
dockerfile_path = "Dockerfile"

[deploy]
healthcheck_path = "/health"
healthcheck_timeout = 100
restart_policy_type = "on_failure"
restart_policy_max_retries = 3

[env]
PORT = "8000"
# Redis will be auto-configured if you add a Redis service
# REDIS_HOST will be automatically set to the internal Redis service
# AZURE_CONNECTION_STRING and other secrets should be set in Railway dashboard

[build.args]
# These can be overridden in Railway dashboard
APP_VERSION = "$RAILWAY_GIT_COMMIT_SHA"
BUILD_DATE = "$RAILWAY_GIT_COMMIT_DATE"
VCS_REF = "$RAILWAY_GIT_COMMIT_SHA"
